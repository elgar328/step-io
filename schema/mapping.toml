# Entities whose writer fills a pre-reserved id (reserve-then-fill): also
# generate `serialize_<entity>_with_id` for those emit paths.
serialize_with_id = [
    "characterized_item_within_representation",
    "model_geometric_view",
]

# `generate_all`: diagnostic flip. When true, gen-early generates *every* entity
# the codegen can handle (filtered by support) + writes schema/coverage.txt,
# instead of just `generate`. Committed as false (the wired 6); flip on locally
# to measure coverage / validate that the full union compiles.
generate_all = false

# `read_only`: entities generated as model + bind only (serialize skipped). For
# read-back-only minority forms the writer normalizes away (QUASI_UNIFORM_* →
# B_SPLINE_*_WITH_KNOTS, per emit_nurbs_curve compatibility-first policy): read
# but never emitted, so their handler `write` is `unreachable!()`. Precondition:
# any enum each entity binds is also used by a serialized entity (b_spline form
# helpers are covered by b_spline_*_with_knots).
read_only = [
    "quasi_uniform_curve",
    "quasi_uniform_surface",
    "rational_quasi_uniform_curve",
    "rational_quasi_uniform_surface",
]

# `[complex.<entity>]`: multi-part (complex) entity. `parts` = ordered supertype
# part names (must match the handler's #[step_entity_complex] cases order). Each
# part contributes its early.toml own_attrs; gen-early emits a part-wise bind
# (require_part_attrs) + a WriterBody::Complex serialize (push_complex). Single
# case only.
[complex.rational_b_spline_curve]
parts = [
    "BOUNDED_CURVE",
    "B_SPLINE_CURVE",
    "B_SPLINE_CURVE_WITH_KNOTS",
    "CURVE",
    "GEOMETRIC_REPRESENTATION_ITEM",
    "RATIONAL_B_SPLINE_CURVE",
    "REPRESENTATION_ITEM",
]

[complex.rational_b_spline_surface]
parts = [
    "BOUNDED_SURFACE",
    "B_SPLINE_SURFACE",
    "B_SPLINE_SURFACE_WITH_KNOTS",
    "GEOMETRIC_REPRESENTATION_ITEM",
    "RATIONAL_B_SPLINE_SURFACE",
    "REPRESENTATION_ITEM",
    "SURFACE",
]

