# Per-entity EXPRESS Derived (`*`) attribute names. early.toml (generated) cannot
# carry DERIVE info, so it is hand-authored here. A listed attr keeps its Part21
# positional slot (later attrs read at the right index) but is omitted from the
# L1 struct + bind and serialized as `*`.
[derived]
oriented_edge = ["edge_start", "edge_end"]
oriented_closed_shell = ["cfs_faces"]

# `[enum.<alias>]`: reuse an existing L2 enum for a STEP ENUM type-alias instead
# of synthesizing an `Early*` enum. `variants` maps each early.toml ENUM member
# to its L2 variant; the STEP Part21 token is the member upper-cased
# (e.g. `central` -> `.CENTRAL.`).
[enum.central_or_parallel]
rust_type = "crate::ir::visualization::Projection"
variants = { central = "Central", parallel = "Parallel" }

# Strict (no `default`): an unknown enum token errors with
# `NonStandardEnumValue` → the dispatcher drops the entity and reclassifies it
# as a NORM normalization (rejecting a non-standard value is correct, not a loss).
[enum.surface_side]
rust_type = "crate::ir::visualization::SurfaceSide"
variants = { positive = "Front", negative = "Back", both = "Both" }

# Strict token-enum (SELECT member, no `catch_all`): an unknown token →
# `None` from `marker_type_from_token`, so the SELECT drops the member; the
# POINT_STYLE handler surfaces the drop as a NORM normalization.
[enum.marker_type]
rust_type = "crate::ir::visualization::MarkerType"
variants = { dot = "Dot", x = "X", plus = "Plus", asterisk = "Asterisk", ring = "Ring", square = "Square", triangle = "Triangle" }

# `[select.<name>]`: synthesize an `Early*` enum for a *mixed* SELECT (members
# span entity / enum / primitive). `variants` names the L1 variant per member;
# the member kind (ref / enum / real / string) and any enum hint are auto-
# derived from early.toml (e.g. member `marker_type` resolves to `[enum.marker_type]`).
[select.marker_select]
rust_type = "EarlyMarker"
variants = { marker_type = "Type", pre_defined_marker = "Predefined" }

[select.size_select]
rust_type = "EarlyMarkerSize"
variants = { descriptive_measure = "Descriptive", measure_with_unit = "MeasureWithUnit", positive_length_measure = "PositiveLength" }

# `trimming_select` = SELECT(cartesian_point[entity], parameter_value[real]) used
# in `TRIMMED_CURVE.trim_1/trim_2` (SET OF). Synthesizes `EarlyTrimSelect`;
# entity member emits a bare `#N`, the real member a `PARAMETER_VALUE(v)` Typed.
# Non-standard TAG-less bare reals (`( 0.0 )`) are accepted and normalized to
# `PARAMETER_VALUE(0.0)` on write (gen-early bare-scalar arm).
[select.trimming_select]
rust_type = "EarlyTrimSelect"
variants = { cartesian_point = "Point", parameter_value = "Param" }

# `source_item` = SELECT(identifier[string], message[string]) used in
# `EXTERNAL_SOURCE.source_id`. Typed-only mixed select (no entity member):
# `IDENTIFIER('..')` / `MESSAGE('..')`. step-io models only `Identifier` in L2.
[select.source_item]
rust_type = "EarlySourceItem"
variants = { identifier = "Identifier", message = "Message" }

[enum.ahead_or_behind]
rust_type = "crate::ir::plm::AheadOrBehind"
variants = { ahead = "Ahead", behind = "Behind", exact = "Exact" }

# `transition_code`: the 4 EXPRESS members exactly. Strict — any other token
# (incl. the non-standard `.UNSPECIFIED.`) errors (NonStandardEnumValue) →
# dropped + NORM.
[enum.transition_code]
rust_type = "crate::ir::geometry::TransitionCode"
variants = { continuous = "Continuous", discontinuous = "Discontinuous", cont_same_gradient = "ContSameGradient", cont_same_gradient_same_curvature = "ContSameGradientSameCurvature" }

# `trimming_preference`: all 3 EXPRESS members map to L2 `TrimMaster`. Strict
# (no `default`): an unknown token errors (NonStandardEnumValue) → dropped + NORM.
[enum.trimming_preference]
rust_type = "crate::ir::geometry::TrimMaster"
variants = { cartesian = "Cartesian", parameter = "Parameter", unspecified = "Unspecified" }

[enum.angle_relator]
rust_type = "crate::ir::pmi::AngleSelection"
variants = { equal = "Equal", large = "Large", small = "Small" }

# `b_spline_curve_form` (b_spline_curve.curve_form). `default` reproduces the
# legacy `CurveForm::from_step_enum` `_ => Unspecified` catch-all exactly (behavior
# preserved; a separate plan will strict-ify forms with a corpus token scan first).
[enum.b_spline_curve_form]
rust_type = "crate::ir::geometry::CurveForm"
variants = { polyline_form = "PolylineForm", circular_arc = "CircularArc", elliptic_arc = "EllipticArc", parabolic_arc = "ParabolicArc", hyperbolic_arc = "HyperbolicArc", unspecified = "Unspecified" }

# Lenient (default) to reproduce SurfaceForm::from_step_enum during the structural
# migration; strict-ification is a separate follow-up (needs a surface-form scan).
[enum.b_spline_surface_form]
rust_type = "crate::ir::geometry::SurfaceForm"
variants = { plane_surf = "PlaneSurf", cylindrical_surf = "CylindricalSurf", conical_surf = "ConicalSurf", spherical_surf = "SphericalSurf", toroidal_surf = "ToroidalSurf", surf_of_revolution = "SurfOfRevolution", ruled_surf = "RuledSurf", generalised_cone = "GeneralisedCone", quadric_surf = "QuadricSurf", surf_of_linear_extrusion = "SurfOfLinearExtrusion", unspecified = "Unspecified" }
