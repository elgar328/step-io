# Multi-case (units-CBU-② Plan 1): SI vs CONVERSION_BASED_UNIT. L1 enum
# EarlyLengthUnit{Si, Cbu}. Both cases: NAMED_UNIT.dimensions = `*` (derived) —
# the complex supertype attr is conventionally Derived (real-world files, e.g. NIST
# ctc_05 `NAMED_UNIT(*)`). CBU adds CONVERSION_BASED_UNIT(name, conversion_factor
# MWU). Part order = each case's emit order (must match the hand emit it replaces).
[complex.length_unit.cases.si]
parts = ["LENGTH_UNIT", "NAMED_UNIT", "SI_UNIT"]
derived = ["dimensions"]

[complex.length_unit.cases.cbu]
parts = ["CONVERSION_BASED_UNIT", "LENGTH_UNIT", "NAMED_UNIT"]
derived = ["dimensions"]
discriminant = "CONVERSION_BASED_UNIT"

# Multi-case (units-CBU-② Plan 2): SI vs CONVERSION_BASED_UNIT. Both cases'
# NAMED_UNIT.dimensions = `*` (Derived). CBU adds CONVERSION_BASED_UNIT(name,
# conversion_factor MWU); unit identified by factor in lower (fixed kg base).
[complex.mass_unit.cases.si]
parts = ["MASS_UNIT", "NAMED_UNIT", "SI_UNIT"]
derived = ["dimensions"]

[complex.mass_unit.cases.cbu]
parts = ["CONVERSION_BASED_UNIT", "MASS_UNIT", "NAMED_UNIT"]
derived = ["dimensions"]
discriminant = "CONVERSION_BASED_UNIT"

# Multi-case (units-CBU-② Plan 2): SI vs CONVERSION_BASED_UNIT. Both cases'
# NAMED_UNIT.dimensions = `*` (Derived). CBU unit identified by factor in lower
# (fixed radian base).
[complex.plane_angle_unit.cases.si]
parts = ["SI_UNIT", "NAMED_UNIT", "PLANE_ANGLE_UNIT"]
derived = ["dimensions"]

[complex.plane_angle_unit.cases.cbu]
parts = ["CONVERSION_BASED_UNIT", "NAMED_UNIT", "PLANE_ANGLE_UNIT"]
derived = ["dimensions"]
discriminant = "CONVERSION_BASED_UNIT"

# GLOBAL_UNIT_ASSIGNED_CONTEXT complex `(GEOMETRIC_REPRESENTATION_CONTEXT …
# REPRESENTATION_CONTEXT)`. Two cases discriminated by the optional
# GLOBAL_UNCERTAINTY_ASSIGNED_CONTEXT part. Flattened L1 fields:
# coordinate_space_dimension (GEO) + uncertainty (GUNCAC, full only) + units
# (GUAC) + context_identifier/context_type (REPR). Part order = ISO 10303-21
# §11.2.5.1 alphabetical (= the hand emit order it replaces). `unit` /
# `uncertainty_measure_with_unit` are all-entity SELECT / entity → Vec<Ref>
# (no derived slots). lower bridges to the bundled UnitContext L2.
[complex.global_unit_assigned_context]
also_simple = true

