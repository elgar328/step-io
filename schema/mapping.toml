# ---------------------------------------------------------------------------
# [codegen] — schema-faithful generator (codegen/ crate) domain seeds.
#
# Each domain seed list is the entry point for a transitive schema closure
# (seed + parents + every entity reachable via attr ty: Ref / SELECT members /
# Vec(Ref) inners). The closure is BOTH the entity set generated AND the
# round-trip subset filter. units seeds copy the spike's constants. Synthetic
# complex names (units multi-inheritance combos) are NOT entities — they enter
# the closure as their component part entities (NAMED_UNIT, SI_UNIT, …) which
# are listed directly so the generic part-bag covers them.
# ---------------------------------------------------------------------------
[codegen]
# Entities kept OUT of the closure (never generated); their referrers escape via
# the round-trip filter. The special-select capabilities (aggregate / entity+enum
# / string) are now all built; the remaining exclusion is deferred for closure
# SCOPE, not a missing capability.
exclude = [
    # item_identified_representation_usage: its `definition` SELECT drags the
    # entire PLM applied-assignment subtree (a large domain with its own gaps) →
    # keep deferred until the PLM domain is brought in as a deliberate step.
    "item_identified_representation_usage",
    # general_property is NOT excluded: it is a represented_definition member
    # (standard via property_definition_representation.definition) and enters the
    # closure that way. The non-standard property_definition.definition=#general_property
    # input (general_property is not a characterized_definition member) is no longer
    # a panic — the slot-aware drop pass classifies it as a Nonstandard drop.
]

[codegen.domains]
units = [
    "dimensional_exponents",
    "measure_with_unit",
    "length_measure_with_unit",
    "uncertainty_measure_with_unit",
    "derived_unit",
    "derived_unit_element",
    # complex part entities (multi-inheritance named_unit instances)
    "named_unit",
    "si_unit",
    "conversion_based_unit",
    "context_dependent_unit",
    "length_unit",
    "mass_unit",
    "plane_angle_unit",
    "solid_angle_unit",
    "time_unit",
    # units context: representation_context complex parts (complex-only) carrying
    # the unit/uncertainty sets. references stay in the units closure (unit =
    # SELECT(derived_unit, named_unit); uncertainty_measure_with_unit) -> low escape.
    "global_unit_assigned_context",
    "global_uncertainty_assigned_context",
]
geometry = [
    "cartesian_point",
    "direction",
    "vector",
    "line",
    "circle",
    "ellipse",
    "b_spline_curve_with_knots",
    # pcurve / surface_curve / seam_curve are OUT of the Phase 0 closure: they
    # drag in the `representation` / pcurve subsystem (definitional_representation
    # + representation_context complex), which is Phase 2 territory. The
    # round-trip filter excludes any entity whose refs escape the closure, so
    # fixtures using these (cylinder/seam curves) still round-trip their
    # in-closure geometry — the escaping edge_curves are simply not compared.
    "axis1_placement",
    "axis2_placement_2d",
    "axis2_placement_3d",
    "plane",
    "cylindrical_surface",
    "conical_surface",
    "spherical_surface",
    "toroidal_surface",
    "surface_of_linear_extrusion",
    "surface_of_revolution",
    "offset_surface",
    "b_spline_surface_with_knots",
    # NURBS complex-only leaves (not ref-reachable; seeded so they enter the
    # closure and get part-bag variants). Membership as complex parts is
    # auto (universal.toml is_complex_part); this is closure scoping only.
