# ---------------------------------------------------------------------------
# codegen support boundary — hand-curated frontier (NOT corpus-automated).
#
# cover:   seed entities. Each list is the entry point for a transitive schema
#          closure (seed + parents + every entity reachable via attr ty: Ref /
#          SELECT members / Vec(Ref) inners). The closure is BOTH the entity set
#          generated AND the round-trip subset filter. Synthetic complex names
#          (multi-inheritance combos) are NOT entities — they enter the closure
#          as their component part entities (NAMED_UNIT, SI_UNIT, …) listed
#          directly so the generic part-bag covers them.
# exclude: entities kept OUT of the closure entirely (global); their referrers
#          escape via the round-trip filter. Used to defer entities whose attrs
#          need a generator capability not yet built, or for closure SCOPE.
# narrow:  restrict a SELECT to the listed members (others not pulled into the
#          closure) — for mega-selects where pulling every member would explode
#          the closure. Applied lockstep to closure expansion AND arm emission.
#          Only remove members of the SAME kind as the survivors (else the
#          SELECT's Kind classification flips).
# ---------------------------------------------------------------------------

# The special-select capabilities (aggregate / entity+enum / string) are all
# built; the remaining exclusion is deferred for closure SCOPE, not a missing
# capability.
exclude = [
    # item_identified_representation_usage: its `definition` SELECT drags the
    # entire PLM applied-assignment subtree (a large domain with its own gaps) →
    # keep deferred until the PLM domain is brought in as a deliberate step.
    "item_identified_representation_usage",
    # general_property is NOT excluded: it is a represented_definition member
    # (standard via property_definition_representation.definition) and enters the
    # closure that way. The non-standard property_definition.definition=#general_property
    # input (general_property is not a characterized_definition member) is no longer
    # a panic — the slot-aware drop pass classifies it as a Nonstandard drop.
]

