# product_definition_formation_with_specified_source are dual-appearance
# (mostly standalone). product_category is a concrete supertype (ProductCategoryRef).
product = [
    "product_related_product_category",
    "product_category",
    "product_category_relationship",
    "product_definition_formation_with_specified_source",
]
# shape representation — geometry/representation based, refs in the backbone
# closure (shape_representation/representation/representation_relationship/shell;
# items via the existing RepresentationItemRef). shape_definition_representation
# .definition=represented_definition: property_definition/shape_aspect closure
# members; property_definition_representation is the SDR parent (reachable).
# general_property enters via the represented_definition member; its non-standard
# use in property_definition.definition is handled by the slot-aware drop pass.
shape = [
    "shape_definition_representation",
    "advanced_brep_shape_representation",
    "shape_representation_relationship",
    "shell_based_surface_model",
    "manifold_surface_shape_representation",
]
# application_protocol_definition: self-contained — its only ref `application`
# points at application_context (scalar-only leaf, no further refs). escape 0.
application = ["application_protocol_definition"]
# draughting_pre_defined_curve_font: parent chain pre_defined_curve_font ->
