# PLM (product lifecycle) — brought in as deliberate group-by-group seeds, not a
# big-bang un-exclude of item_identified_representation_usage. Most members are
# all-entity selects (already handled; just generated). New gaps surface per group
# and are triaged: existing capability OK / entity+scalar (#1) / monster
# (maths/heterogeneous) sub-excluded + catalogued.
# Group (a): person / organization / project identification core (roles,
# relationships, addresses). The applied-*-assignment roots are intentionally NOT
# seeded here: their `items` attr is a ~90-member mega-select (person_and_
# organization_item / organization_item / project_item) that drags the entire PLM
# + product + representation + recursive-maths graph in one shot — the same
# big-bang drag that keeps item_identified deferred. Assignment roots become a
# deliberate later step (needs the maths cluster excluded + broad closure).
plm_person_org = [
    "person",
    "organization",
    "person_and_organization",
    "address",
    "personal_address",
    "organizational_address",
    "person_and_organization_address",
    "organization_relationship",
    "organization_role",
    "organization_type",
    "organization_type_role",
    "organizational_project",
    "organizational_project_relationship",
    "organizational_project_role",
    "person_and_organization_role",
]
# Group (b) applied-assignment: ATTEMPTED, then rolled back. Seeding the
# applied-*-assignment roots pulled the whole PLM+product+representation graph
# (the ~90-member `items` mega-select), growing closure 176->569 but adding only
# ~1.1M validated while escaping ~30M (their refs leave the closure:
# item_identified / maths / surrounding subtree). Net coverage 99.8%->90.4% — a
# poor value/escape ratio vs the identification core (+307k validated / +88
# escaped). Deferred in favor of incremental, low-escape PLM entities (date /
# document identification, etc.) as a redesigned next step. (The maths exclude
# that this big-bang required is also removed, since maths is only reachable
# through the assignment items mega-select.)

# presentation/style — the largest unmodeled cluster in real-world files (~25M instances:
# styled_item 4.4M, presentation_style_assignment 4.2M, colour_rgb 4.1M, the
# fill/surface_style family ~4.1M each). NOT a big-bang: styled_item.item targets
# geometric/topological_representation_item (already in the geometry/topology
# closure), and the style selects are self-contained — so this should LOWER
# escaped (representation.items currently escapes when it points at unseeded
# styled_item). Round 1 = pure style cluster only; mddgpr/draughting (which carry
# the broad representation_item select) are a later, escape-measured round.
presentation = [
    "styled_item",
    "presentation_style_assignment",
    "colour_rgb",
    "fill_area_style",
    "fill_area_style_colour",
    "surface_style_usage",
    "surface_side_style",
    "surface_style_fill_area",
    "surface_style_rendering",
    "surface_style_rendering_with_properties",
    "surface_style_transparent",
    "surface_style_parameter_line",
    "curve_style",
]
# date/time — fully self-contained (scalar/enum + intra-cluster refs only, no
# external references), so very low escape. date_and_time is dual-appearance
