# + product + representation + recursive-maths graph in one shot — the same
# big-bang drag that keeps item_identified deferred. Assignment roots become a
# deliberate later step (needs the maths cluster excluded + broad closure).
plm_person_org = [
    "person",
    "organization",
    "person_and_organization",
    "address",
    "personal_address",
    "organizational_address",
    "person_and_organization_address",
    "organization_relationship",
    "organization_role",
    "organization_type",
    "organization_type_role",
    "organizational_project",
    "organizational_project_relationship",
    "organizational_project_role",
    "person_and_organization_role",
]
